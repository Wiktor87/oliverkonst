name: Order Notification

on:
  push:
    paths:
      - 'data/orders.json'

permissions:
  contents: read
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only run for order commits (not deploy or admin edits)
    if: startsWith(github.event.head_commit.message, 'New order:')
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Issue for new order
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const orders = JSON.parse(fs.readFileSync('data/orders.json', 'utf8'));
            if (orders.length === 0) return;

            const order = orders[orders.length - 1];
            const siteContent = JSON.parse(fs.readFileSync('data/site-content.json', 'utf8'));
            const recipients = siteContent.notificationEmails || siteContent.contactEmail || '';
            if (!recipients) {
              console.log('No notification recipients configured');
              return;
            }

            const deliveryLabel = order.deliveryMethod === 'shipping' ? 'Frakt' : 'Upphämtning';
            const addressBlock = order.deliveryMethod === 'shipping' && order.customerAddress
              ? `**Adress:** ${order.customerAddress}, ${order.customerPostalCode} ${order.customerCity}`
              : '';

            const itemLines = order.items
              .map(i => `- ${i.title?.sv || i.title?.en || '–'} x${i.quantity} = ${(i.price * i.quantity).toLocaleString('sv-SE')} SEK`)
              .join('\n');

            const body = [
              `## Ny beställning`,
              ``,
              `**Kund:** ${order.customerName}`,
              `**E-post:** ${order.customerEmail}`,
              order.customerPhone ? `**Telefon:** ${order.customerPhone}` : '',
              `**Leverans:** ${deliveryLabel}`,
              addressBlock,
              ``,
              `### Produkter`,
              itemLines,
              ``,
              `**Produkter totalt:** ${order.totalProducts?.toLocaleString('sv-SE')} SEK`,
              order.totalShipping > 0 ? `**Frakt:** ${order.totalShipping.toLocaleString('sv-SE')} SEK` : '',
              `**TOTALT: ${order.totalAmount.toLocaleString('sv-SE')} SEK**`,
              ``,
              `---`,
              `Order-ID: \`${order.id}\``,
              `Datum: ${new Date(order.createdAt).toLocaleString('sv-SE')}`,
              ``,
              `E-postmottagare: ${recipients}`,
            ].filter(Boolean).join('\n');

            // Create a GitHub Issue – repo watchers get email notifications automatically
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Ny beställning: ${order.customerName} – ${order.totalAmount.toLocaleString('sv-SE')} SEK`,
              body,
            });

            console.log(`Created issue for order ${order.id}`);
